<!DOCTYPE html>
<html>
<head>
  <title>Global Express</title>

  <style>
    body {
      font-family: Arial;
      background:#f2f4f7;
      margin:0;
    }

    header {
      background:#2f4b7c;
      color:white;
      padding:15px;
      font-size:20px;
    }

    .container {
      max-width:600px;
      margin:30px auto;
      padding:20px;
    }

    .card {
      background:white;
      padding:20px;
      border-radius:12px;
    }

    input {
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    button {
      width:100%;
      padding:12px;
      margin-top:10px;
      background:#2f4b7c;
      color:white;
      border:none;
      border-radius:8px;
    }

    .result {
      margin-top:20px;
      background:#d9d0c3;
      padding:20px;
      border-radius:12px;
      border-left:6px solid orange;
    }

    .title {
      font-size:24px;
      font-weight:bold;
    }

    .steps {
      display:flex;
      justify-content:space-between;
      margin:20px 0;
    }

    .step {
      text-align:center;
      flex:1;
    }

    .circle {
      width:40px;
      height:40px;
      border-radius:50%;
      margin:auto;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      font-weight:bold;
    }

    .done { background:green; }
    .active { background:#2f4b7c; }
    .pending { background:#ccc; }

    .info {
      margin-top:8px;
      font-size:16px;
    }

    .fee {
      color:red;
      font-weight:bold;
      margin-top:10px;
    }
  </style>
</head>

<body>

<header>🌍 Global Express</header>

<div class="container">
  <div class="card">
    <h2>Track Package</h2>

    <input id="code" placeholder="Enter Tracking Code">
    <button onclick="track()">Track</button>

    <div id="output"></div>
  </div>
</div>

<script>
function track() {
  let code = document.getElementById("code").value;
  let data = JSON.parse(localStorage.getItem(code));

  if (!data) {
    document.getElementById("output").innerHTML = "❌ Tracking Not Found";
    return;
  }

  let steps = ["Shipped", "In Transit", "On Hold", "Delivered"];

  let currentIndex = steps.indexOf(data.status);

  let stepHTML = steps.map((step, index) => {
    let className = "pending";
    let icon = "";

    if (index < currentIndex) {
      className = "done";
      icon = "✔";
    } else if (index === currentIndex) {
      className = "active";
      icon = "✔";
    }

    return `
      <div class="step">
        <div class="circle ${className}">${icon}</div>
        <div>${step}</div>
      </div>
    `;
  }).join("");

  document.getElementById("output").innerHTML = `
    <div class="result">

      <div class="title">${data.status}</div>

      <div class="steps">
        ${stepHTML}
      </div>

      <div class="info"><b>Tracking:</b> ${code}</div>
      <div class="info"><b>Origin:</b> ${data.origin}</div>
      <div class="info"><b>Destination:</b> ${data.destination}</div>
      <div class="info"><b>Location:</b> ${data.location}</div>
      <div class="info"><b>Date:</b> ${data.date}</div>

      ${data.fee ? `<div class="fee">⚠ Clearance Fee: $${data.fee}</div>` : ""}

    </div>
  `;
}
</script>

</body>
</html>
