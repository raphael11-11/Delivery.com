<!DOCTYPE html>
<html>
<head>
  <title>Global Express</title>

  <style>
    body {
      font-family: Arial;
      margin:0;
      background:#f5f5f5;
    }

    header {
      background:#4d148c;
      color:white;
      padding:15px;
      font-size:20px;
      font-weight:bold;
    }

    .container {
      max-width:600px;
      margin:20px auto;
      padding:15px;
    }

    .card {
      background:white;
      padding:20px;
      border-radius:12px;
    }

    input {
      width:100%;
      padding:12px;
      border-radius:8px;
      border:1px solid #ccc;
      margin-top:10px;
    }

    button {
      width:100%;
      padding:12px;
      margin-top:10px;
      background:#4d148c;
      color:white;
      border:none;
      border-radius:8px;
    }

    .result {
      margin-top:20px;
    }

    .tracking {
      text-align:center;
      margin:20px 0;
      font-size:18px;
    }

    .timeline {
      position:relative;
      margin-left:20px;
      padding-left:30px;
      border-left:4px solid #ddd;
    }

    .step {
      margin-bottom:25px;
      position:relative;
    }

    .circle {
      width:18px;
      height:18px;
      background:#ccc;
      border-radius:50%;
      position:absolute;
      left:-38px;
      top:5px;
    }

    .active {
      background:#4d148c;
      width:24px;
      height:24px;
      left:-41px;
    }

    .done {
      background:#4d148c;
    }

    .label {
      font-weight:bold;
    }

    .small {
      color:#555;
      font-size:14px;
    }

    .fee {
      margin-top:15px;
      color:red;
      font-weight:bold;
    }
  </style>
</head>

<body>

<header>📦 Global Express</header>

<div class="container">
  <div class="card">
    <h2>Track Package</h2>

    <input id="code" placeholder="Enter Tracking Code">
    <button onclick="track()">Track</button>

    <div id="output"></div>
  </div>
</div>

<script>
function track() {
  let code = document.getElementById("code").value;
  let data = JSON.parse(localStorage.getItem(code));

  if (!data) {
    document.getElementById("output").innerHTML = "❌ Not Found";
    return;
  }

  let steps = [
    {name:"Picked Up", key:"Shipped"},
    {name:"In Transit", key:"Transit"},
    {name:"On Hold", key:"Hold"},
    {name:"Out for Delivery", key:"Delivery"}
  ];

  let htmlSteps = steps.map(step => {
    let className = "";

    if (step.key === data.status) {
      className = "active";
    } else if (steps.findIndex(s=>s.key===step.key) < steps.findIndex(s=>s.key===data.status)) {
      className = "done";
    }

    return `
      <div class="step">
        <div class="circle ${className}"></div>
        <div class="label">${step.name}</div>
        <div class="small">${data.location}</div>
      </div>
    `;
  }).join("");

  document.getElementById("output").innerHTML = `
    <div class="result">

      <div class="tracking">
        <b>${code}</b><br>
        From: ${data.origin}<br>
        To: ${data.destination}
      </div>

      <div class="timeline">
        ${htmlSteps}
      </div>

      <div class="small">Current Location: ${data.location}</div>
      <div class="small">Date: ${data.date}</div>

      ${data.fee ? `<div class="fee">⚠ Clearance Fee: $${data.fee}</div>` : ""}

    </div>
  `;
}
</script>

</body>
</html>
