<!DOCTYPE html>
<html>
<head>
  <title>Global Express Logistics</title>

  <style>
    body {
      font-family: Arial;
      background: #eef2f7;
      margin: 0;
    }

    header {
      background: #1f3c88;
      color: white;
      padding: 18px;
      font-size: 22px;
      text-align: center;
      font-weight: bold;
    }

    .container {
      max-width: 750px;
      margin: 40px auto;
      padding: 20px;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 12px;
    }

    input {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 16px;
      margin-top: 15px;
      background: #1f3c88;
      color: white;
      border: none;
      font-size: 18px;
      border-radius: 8px;
    }

    .result {
      margin-top: 30px;
      background: #e6d8c5;
      padding: 25px;
      border-radius: 12px;
      border-left: 6px solid orange;
    }

    .status-title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .steps {
      display: flex;
      justify-content: space-between;
      margin-bottom: 25px;
    }

    .step {
      text-align: center;
      flex: 1;
    }

    .circle {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      margin: auto;
      line-height: 45px;
      color: white;
      font-weight: bold;
      font-size: 18px;
    }

    .active { background: green; }
    .inactive { background: #bbb; }

    .info {
      font-size: 18px;
      margin-top: 10px;
    }

    .fee {
      color: red;
      font-weight: bold;
      margin-top: 15px;
      font-size: 20px;
    }
  </style>
</head>

<body>

<header>🌍 Global Express Logistics</header>

<div class="container">
  <div class="box">
    <h2>Track Your Shipment</h2>

    <input id="code" placeholder="Enter Tracking Code">
    <button onclick="track()">Track Package</button>

    <div id="output"></div>
  </div>
</div>

<script>
function track() {
  let code = document.getElementById("code").value;
  let data = JSON.parse(localStorage.getItem(code));

  if (!data) {
    document.getElementById("output").innerHTML = "<p>❌ Tracking Not Found</p>";
    return;
  }

  let s = data.status;

  let shipped = (s=="Shipped"||s=="In Transit"||s=="On Hold"||s=="Delivered") ? "active":"inactive";
  let transit = (s=="In Transit"||s=="On Hold"||s=="Delivered") ? "active":"inactive";
  let hold = (s=="On Hold") ? "active":"inactive";
  let delivered = (s=="Delivered") ? "active":"inactive";

  document.getElementById("output").innerHTML = `
    <div class="result">
      <div class="status-title">${s}</div>

      <div class="steps">
        <div class="step">
          <div class="circle ${shipped}">✓</div>
          <div>Shipped</div>
        </div>

        <div class="step">
          <div class="circle ${transit}">✓</div>
          <div>Transit</div>
        </div>

        <div class="step">
          <div class="circle ${hold}">!</div>
          <div>Hold</div>
        </div>

        <div class="step">
          <div class="circle ${delivered}">✓</div>
          <div>Delivered</div>
        </div>
      </div>

      <div class="info"><b>Tracking:</b> ${code}</div>
      <div class="info"><b>Location:</b> ${data.location}</div>
      <div class="info"><b>Date:</b> ${data.date}</div>

      ${data.fee ? `<div class="fee">⚠ Clearance Fee: $${data.fee}</div>` : ""}
    </div>
  `;
}
</script>

</body>
</html>
