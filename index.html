<!DOCTYPE html>
<html>
<head>
  <title>Global Express Logistics</title>

  <style>
    body { font-family: Arial; background:#eef2f7; margin:0; }

    header {
      background:#1f3c88;
      color:white;
      padding:18px;
      text-align:center;
      font-size:22px;
      font-weight:bold;
    }

    .container {
      max-width:700px;
      margin:40px auto;
      padding:20px;
    }

    .box {
      background:white;
      padding:25px;
      border-radius:12px;
    }

    input {
      width:100%;
      padding:15px;
      font-size:18px;
      margin-top:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    button {
      width:100%;
      padding:15px;
      margin-top:15px;
      background:#1f3c88;
      color:white;
      border:none;
      font-size:18px;
      border-radius:8px;
    }

    .result {
      margin-top:30px;
      background:#e6d8c5;
      padding:25px;
      border-radius:12px;
      border-left:6px solid orange;
    }

    .title { font-size:26px; font-weight:bold; }

    .info { margin-top:10px; font-size:18px; }

    .fee {
      color:red;
      font-weight:bold;
      margin-top:15px;
      font-size:20px;
    }
  </style>
</head>

<body>

<header>🌍 Global Express Logistics</header>

<div class="container">
  <div class="box">
    <h2>Track Your Shipment</h2>

    <input id="code" placeholder="Enter Tracking Code">
    <button onclick="track()">Track</button>

    <div id="output"></div>
  </div>
</div>

<script>
function track() {
  let code = document.getElementById("code").value;
  let data = JSON.parse(localStorage.getItem(code));

  if (!data) {
    document.getElementById("output").innerHTML = "❌ Tracking Not Found";
    return;
  }

  document.getElementById("output").innerHTML = `
    <div class="result">
      <div class="title">${data.status}</div>

      <div class="info"><b>Tracking:</b> ${code}</div>
      <div class="info"><b>Origin:</b> ${data.origin}</div>
      <div class="info"><b>Destination:</b> ${data.destination}</div>
      <div class="info"><b>Current Location:</b> ${data.location}</div>
      <div class="info"><b>Date:</b> ${data.date}</div>

      ${data.fee ? `<div class="fee">⚠ Clearance Fee: $${data.fee}</div>` : ""}
    </div>
  `;
}
</script>

</body>
</html>
