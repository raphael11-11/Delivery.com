<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Boy Alone Logistics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
}

.container{
    max-width:380px;
    margin:auto;
    padding:15px;
}

h1{
    text-align:center;
    color:#8a2be2;
    font-size:18px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    border:none;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#8a2be2;
    border:none;
    color:white;
    border-radius:6px;
}

.card{
    background:#1c1c1c;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}

.timeline{
    border-left:2px solid #555;
    margin-left:10px;
    padding-left:15px;
}

.step{
    margin-bottom:15px;
    position:relative;
}

.step::before{
    content:"";
    width:12px;
    height:12px;
    background:#555;
    border-radius:50%;
    position:absolute;
    left:-22px;
    top:3px;
}

.active::before{
    background:#00bfff;
}

.active{
    color:#00bfff;
}

.hold{
    color:#ff4d4d;
}

.fee{
    color:#ff4d4d;
    margin-top:10px;
    font-weight:bold;
}

.small{
    font-size:13px;
    color:#ccc;
}
</style>
</head>

<body>

<div class="container">

<h1>Boy Alone Logistics</h1>

<input type="text" id="code" placeholder="Enter Tracking Code">
<button onclick="track()">Track</button>

<div id="result"></div>

</div>

<script>

let data = {
    code: "00000008JHR",
    from: "Loma 642 Villa Diego Villarreal 66550, NLE MEX",
    to: "5757 W Century Blvd, Los Angeles, CA 90045",
    status: "On Hold",
    location: "California International Airport",
    fee: 5000,
    date: "Thu Mar 26 2026"
};

function track(){
    let input = document.getElementById("code").value;

    if(input !== data.code){
        alert("Invalid tracking code");
        return;
    }

    function active(step){
        return data.status === step ? "active" : "";
    }

    let holdMessage = "";

    if(data.status === "On Hold"){
        holdMessage = `
        <div class="fee">
        ⚠ Your package is on hold due to clearance payment.<br>
        Pay $${data.fee} to proceed with delivery.
        </div>`;
    }

    document.getElementById("result").innerHTML = `
    <div class="card">

        <h3>${data.code}</h3>

        <p class="small"><b>From:</b> ${data.from}</p>
        <p class="small"><b>To:</b> ${data.to}</p>

        <div class="timeline">

            <div class="step ${active("Picked Up")}">
                <b>Picked Up</b><br>
                <span class="small">${data.location}</span>
            </div>

            <div class="step ${active("In Transit")}">
                <b>In Transit</b><br>
                <span class="small">${data.location}</span>
            </div>

            <div class="step ${active("On Hold")} hold">
                <b>On Hold</b><br>
                <span class="small">${data.location}</span>
            </div>

            <div class="step ${active("Out for Delivery")}">
                <b>Out for Delivery</b><br>
                <span class="small">${data.location}</span>
            </div>

        </div>

        <p class="small"><b>Current Location:</b> ${data.location}</p>
        <p class="small"><b>Date:</b> ${data.date}</p>

        ${holdMessage}

    </div>`;
}

</script>

</body>
</html>
