<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Boy Alone Logistics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:#fff;
}

.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    color:#8a2be2;
}

input, select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    background:#8a2be2;
    border:none;
    color:white;
    border-radius:6px;
    font-weight:bold;
}

.card{
    background:#1c1c1c;
    padding:15px;
    border-radius:10px;
    margin-top:20px;
}

.status{
    margin:10px 0;
}

.active{
    color:#00ffcc;
}

.hold{
    color:red;
}

.footer{
    margin-top:30px;
    text-align:center;
    font-size:12px;
    color:#aaa;
}
</style>
</head>

<body>

<div class="container">

<h1>Boy Alone Logistics</h1>

<!-- TRACKING -->
<div id="trackPage">
    <input type="text" id="trackInput" placeholder="Enter Tracking Code">
    <button onclick="track()">Track Package</button>

    <div id="result"></div>
</div>

<!-- ADMIN LOGIN -->
<div id="adminLogin" style="display:none;">
    <input type="password" id="adminPass" placeholder="Admin Password">
    <button onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none;">
    <h3>Admin Panel</h3>

    <select id="status">
        <option>Picked Up</option>
        <option>In Transit</option>
        <option>On Hold</option>
        <option>Out for Delivery</option>
        <option>Delivered</option>
    </select>

    <input type="text" id="location" placeholder="Current Location">
    <input type="number" id="fee" placeholder="Clearance Fee ($)">
    
    <button onclick="save()">Update Status</button>
</div>

<div class="footer">
© 2026 Boy Alone Logistics
</div>

</div>

<script>

// DEFAULT DATA
let data = {
    code: "00000008JHR",
    from: "Loma 642 Villa Diego Villarreal 66550, NLE MEX",
    to: "5757 W Century Blvd, Los Angeles, CA 90045",
    status: "On Hold",
    location: "California International Airport",
    fee: 100
};

// LOAD SAVED DATA
if(localStorage.getItem("tracking")){
    data = JSON.parse(localStorage.getItem("tracking"));
}

// TRACK FUNCTION
function track(){
    let input = document.getElementById("trackInput").value;

    if(input !== data.code){
        alert("Invalid tracking code");
        return;
    }

    let holdMessage = "";

    if(data.status === "On Hold"){
        holdMessage = `
        <p class="hold">
        ⚠ Your package is currently on hold at California International Airport.<br>
        Reason: Clearance fee required before delivery.<br>
        Please pay $${data.fee} to continue delivery.
        </p>`;
    }

    document.getElementById("result").innerHTML = `
    <div class="card">
        <h3>${data.code}</h3>
        <p><b>From:</b> ${data.from}</p>
        <p><b>To:</b> ${data.to}</p>

        <div class="status ${data.status==="On Hold"?"hold":"active"}">
            <b>Status:</b> ${data.status}
        </div>

        <p><b>Current Location:</b> ${data.location}</p>
        ${holdMessage}
    </div>`;
}

// ADMIN ACCESS (?admin)
if(window.location.search.includes("admin")){
    document.getElementById("trackPage").style.display = "none";
    document.getElementById("adminLogin").style.display = "block";
}

// LOGIN
function login(){
    let pass = document.getElementById("adminPass").value;

    if(pass === "1234"){
        document.getElementById("adminLogin").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
    }else{
        alert("Wrong password");
    }
}

// SAVE ADMIN DATA
function save(){
    data.status = document.getElementById("status").value;
    data.location = document.getElementById("location").value;
    data.fee = document.getElementById("fee").value;

    localStorage.setItem("tracking", JSON.stringify(data));

    alert("Updated successfully");
}

</script>

</body>
</html>
